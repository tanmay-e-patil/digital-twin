version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digital-twin-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - USE_S3=false
      - MEMORY_DIR=./memory
    volumes:
      - ./memory:/app/memory
      - ./backend/data:/app/data
    user: "1000:1000"
    restart: unless-stopped
